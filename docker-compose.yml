services:
  postgres:
    image: postgres:15
    container_name: optidb_postgres
    environment:
      POSTGRES_DB: unoptimized_db
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ai_user -d unoptimized_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: optidb_app
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
