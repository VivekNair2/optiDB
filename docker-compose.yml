services:
  postgres:
    build:
      context: .
      dockerfile: postgres.Dockerfile
    container_name: optidb_postgres
    environment:
      POSTGRES_DB: unoptimized_db
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: secret
      TPCH_SCALE: "0.1"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "psql -U ai_user -d unoptimized_db -c 'SELECT 1 FROM lineitem LIMIT 1;' > /dev/null 2>&1" ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  app:
    build: .
    container_name: optidb_app
    ports:
      - "8501:8501"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
